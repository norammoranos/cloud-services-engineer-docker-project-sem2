services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${MOMO_BACKEND_IMAGE:-docker-project-backend}:${MOMO_IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "8081"
    networks:
      - backend
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cpus: "${MOMO_BACKEND_CPUS:-0.50}"
    mem_limit: "${MOMO_BACKEND_MEMORY:-128m}"
    pids_limit: 200

  backend-lb:
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile
    image: ${MOMO_PROXY_IMAGE:-docker-project-backend-lb}:${MOMO_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${MOMO_API_PORT:-8081}:8080"
    networks:
      - frontend
      - backend
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/cache/nginx:size=16m,uid=101,gid=101
      - /var/run:size=8m,uid=101,gid=101
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cpus: "${MOMO_PROXY_CPUS:-0.25}"
    mem_limit: "${MOMO_PROXY_MEMORY:-64m}"
    pids_limit: 200
    healthcheck:
      test: ["CMD", "/bin/busybox", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        MOMO_WEB_API_PATH: ${MOMO_WEB_API_PATH:-/api}
        MOMO_WEB_PUBLIC_BASE: ${MOMO_WEB_PUBLIC_BASE:-/}
    image: ${MOMO_FRONTEND_IMAGE:-docker-project-frontend}:${MOMO_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      backend-lb:
        condition: service_healthy
    ports:
      - "${MOMO_WEB_PORT:-80}:8080"
    networks:
      - frontend
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/cache/nginx:size=16m,uid=101,gid=101
      - /var/run:size=8m,uid=101,gid=101
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cpus: "${MOMO_WEB_CPUS:-0.25}"
    mem_limit: "${MOMO_WEB_MEMORY:-64m}"
    pids_limit: 200

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
